      - paragraph [ref=e157]: ADB dự báo tăng trưởng kinh tế Việt Nam năm nay ở mức 7,2% dù chịu ảnh hưởng xung đột Trung Đông.
      - article [ref=e158]:
        - paragraph [ref=e159]: Tại họp báo ngày 10/4, ông Nguyễn Bá Hùng, chuyên gia kinh tế trưởng ADB, cho biết tăng trưởng kinh tế Việt Nam được hỗ trợ nhờ các giải pháp ứng phó linh hoạt và kịp thời của nhà điều hành trước cú sốc giá dầu từ xung đột Trung Đông.
        - paragraph [ref=e160]: Chính phủ đưa ra nhiều biện pháp tài khóa có thời hạn như giảm thuế, sử dụng Quỹ bình ổn kết hợp điều hành giá xăng dầu được vận dụng linh hoạt. Những động thái này góp phần kiềm chế áp lực lạm phát ngắn hạn và hỗ trợ tăng trưởng.
        - paragraph [ref=e161]: ADB dự báo tăng trưởng kinh tế Việt Nam năm nay ở mức 7,2%, lạm phát 4%. Con số này thấp hơn mục tiêu 10% Chính phủ đặt ra năm nay, nhưng theo ADB dự báo này khả quan trên nền tăng trưởng cao 8% của năm 2025.
        - 'figure "Cụm cảng Cái Mép - Thị Vải nhìn từ phía hạ lưu, ngày 15/8/2025. Ảnh: Trường Hà" [ref=e162]':
          - 'img "Cụm cảng Cái Mép - Thị Vải nhìn từ phía hạ lưu, ngày 15/8/2025. Ảnh: Trường Hà" [ref=e164]'
          - paragraph [ref=e166]:
            - text: "Cụm cảng Cái Mép - Thị Vải nhìn từ phía hạ lưu, ngày 15/8/2025. Ảnh:"
            - emphasis [ref=e167]: Trường Hà
        - paragraph [ref=e168]: Dự báo mức tăng trưởng này được ADB đưa ra dựa trên kịch bản giá dầu Brent giao ngay giảm về mức 72 USD một thùng năm nay, giảm tiếp về 63 USD trong năm tiếp theo. Hiện giá dầu Brent giao tương lai gần 97 USD một thùng.
        - paragraph [ref=e169]: Mức giá dầu ADB đưa ra cũng lạc quan hơn 3 kịch bản ngân hàng này công bố cuối tháng trước, là quanh 105-155 USD một thùng trong quý II, giảm dần cho đến khi xung đột chấm dứt.
        - paragraph [ref=e170]:
          - text: Ông Nguyễn Bá Hùng cho biết họ chưa đưa ra dự báo GDP cụ thể với các kịch bản khó khăn hơn, bởi đánh giá này cần dựa trên nhiều yếu tố, gồm phản ứng của các chính phủ. Ở phạm vi khu vực, ADB đã công bố tăng trưởng kinh tế của 10 nước khu vực ASEAN có thể
          - link "giảm" [ref=e171] [cursor=pointer]:
            - /url: https://vnexpress.net/adb-10-nuoc-asean-co-the-giam-toi-2-3-gdp-vi-xung-dot-trung-dong-5055396.html
          - text: 0,6-2,3% trong giai đoạn 2026-2027. Tuy nhiên, các đánh giá này mới dừng ở mô hình, chưa tính đến ứng phó của các nước trước biến động xung đột.
        - paragraph [ref=e172]: Chuyên gia ADB khuyến nghị về dài hạn, Việt Nam cần nâng cao hiệu quả sử dụng năng lượng, đa dạng nguồn cung và đẩy nhanh chuyển dịch sang năng lượng sạch.
        - paragraph [ref=e173]: Tuy nhiên, cuộc xung đột kéo dài tại Trung Đông có thể tiếp tục gây gián đoạn dòng chảy dầu, khí và phân bón qua eo biển Hormuz, làm tăng chi phí và chậm thời gian vận chuyển. Tăng trưởng chậm lại tại các đối tác thương mại lớn cũng có thể thu hẹp thặng dư thương mại, làm giảm tốc độ tăng trưởng của Việt Nam.
        - paragraph [ref=e174]: Bên cạnh đó, chính sách thuế của Mỹ sau 150 ngày áp thuế khẩn cấp còn khó lường. Trước nhiều biến động, chỉ số nhà quản trị mua hàng (PMI) đang về gần ngưỡng 50 trong tháng 3, thời điểm diễn ra xung đột, sau khi duy trì ở ngưỡng cao trong vài tháng trước đó.
        - paragraph [ref=e175]: Trong trung hạn, giới phân tích cho rằng đòn bẩy tăng trưởng nằm ở việc nâng cao hiệu quả khu vực công, thu hút vốn tư nhân và củng cố sức chống chịu nền kinh tế. Nhóm giải pháp trọng tâm gồm đẩy mạnh cải cách thể chế, tái cơ cấu hành chính, kết hợp tối ưu hóa đầu tư công và hoàn thiện khuôn khổ pháp lý.
        - paragraph [ref=e176]:
          - strong [ref=e177]: Thủy Trương
